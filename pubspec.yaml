name: domina_app
description: A new Flutter project.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.1+2

environment:
  sdk: '>=3.1.3 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  flutter_native_splash: ^2.3.7
  flutter_launcher_icons: ^0.14.1
  flutter_screenutil: ^5.9.3
  get: ^4.6.6
  flutter_spinkit: ^5.2.1
  dio:
  pretty_dio_logger: ^1.3.1
  get_it: ^9.2.1
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  retrofit: ^4.1.0
  analyzer: ^10.0.1
  freezed: ^3.2.5
  equatable: ^2.0.5
  shimmer: ^3.0.0
  lottie: ^3.1.2
  sqflite_sqlcipher: ^3.0.0
  # لتخزين وجلب مفتاح التشفير من الـ Keystore / Secure Enclave
  flutter_secure_storage: ^9.0.0
  path: ^1.9.0
  easy_localization: ^3.0.7
  build_runner: ^2.2.1
  retrofit_generator: ^10.2.5
  json_serializable: ^6.4.1
  custom_dropdown_search: ^1.0.0
  flutter_html: ^3.0.0-beta.2
  flutter_svg: ^2.0.4
  flutter_phoenix: ^1.1.1
  connectivity_plus: ^7.1.1
  permission_handler: ^12.0.1

  image_picker: ^1.1.2
  html: ^0.15.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  font_awesome_flutter: ^11.0.0
  flutter_animated_button: ^2.0.4
  android_alarm_manager_plus: ^5.0.0
  responsive_framework: ^1.5.1
  flutter_zoom_drawer: ^3.2.0
  lucide_icons_flutter: ^3.1.12
  lucide_icons: ^0.257.0
  pull_to_refresh: ^2.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.5.2
  logging: ^1.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/new_logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/images/new_logo.png"


flutter_native_splash:
  # اللون الأساسي لخلفية شاشة البدء
  color: "#1E3A5F"

  # مسار شعار التطبيق الذي سيظهر في المنتصف
  image: assets/images/new_logo1.png

  # ضبط تموضع الصورة في المنتصف لضمان عدم تمددها
  android_gravity: center
  ios_content_mode: center

  # تفعيل الشاشة لكل من أندرويد وآيفون
  android: true
  ios: true

  # إعدادات إضافية لأندرويد 12 لضمان ظهور اللون واللوغو بشكل صحيح
  android_12:
    image: assets/images/new_logo1.png
    color: "#1E3A5F"
# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/json/
    - assets/fonts/
    - assets/images/spec/
    - assets/images/async/
  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai/Almarai-Regular.ttf
          weight: 400
        - asset: assets/fonts/Almarai/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/Almarai/Almarai-ExtraBold.ttf
          weight: 200
        - asset: assets/fonts/Almarai/Almarai-Light.ttf
          weight: 300
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal/Tajawal-ExtraBold.ttf
          weight: 200
        - asset: assets/fonts/Tajawal/Tajawal-Light.ttf
          weight: 300